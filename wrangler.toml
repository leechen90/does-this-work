name = "dummy-worker"
main = "src/index.ts"
compatibility_date = "2026-06-07"

# Deploy with Cloudflare button will auto-provision these resources.

[browser]
binding = "BROWSER"
remote = true

[assets]
binding = "ASSETS"
directory = "./public"
run_worker_first = ["/widget/*"]

[ai]
binding = "AI"

[vars]
JWT_SECRET = ""

# D1: no database_id -> Cloudflare auto-provisions a new one on deploy.
[[d1_databases]]
binding = "DB"
database_name = "dummy-db"

# Vectorize: index auto-provisioned on deploy.
[[vectorize]]
binding = "VECTOR_INDEX"
index_name = "dummy-index"

# Queues: auto-provisioned on deploy.
[[queues.producers]]
binding = "DOCUMENT_QUEUE"
queue = "dummy-queue"

[[queues.consumers]]
queue = "dummy-queue"
max_batch_size = 10
max_batch_timeout = 5

# Durable Objects: class defined in src/index.ts.
[durable_objects]
bindings = [{ name = "CHAT_SESSIONS", class_name = "ChatSessionStore" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatSessionStore"]